name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Deploy to Firebase Hosting
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node --version
          [ -n "$SERVICE_ACCOUNT_JSON" ] && echo "SERVICE_ACCOUNT: set" || { echo "ERROR: FIREBASE_SERVICE_ACCOUNT secret is missing"; exit 1; }
          echo "$SERVICE_ACCOUNT_JSON" | jq . > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          npx firebase-tools@latest deploy --only hosting --project jh-chandanagar-hyd-83c57 --non-interactive
          rm -f /tmp/sa.json
